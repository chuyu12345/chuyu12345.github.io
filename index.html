<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zeep 在线刷步 - Liquid Glass Ultimate</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #ff6700;
            --font-main: -apple-system, "SF Pro Display", BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        p { margin: 0; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: var(--font-main);
            background: #000; overflow-x: hidden; overflow-y: auto;
            display: flex; align-items: center; justify-content: center;
        }

        /* ======== 背景 ======== */
        .bg-video {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            filter: brightness(0.85) contrast(1.1);
        }
        .video-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at 50% 30%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.55) 100%);
        }

        /* ======== 主容器 ======== */
        .app-container {
            width: 90%; max-width: 400px;
            position: relative; z-index: 10;
            display: flex; flex-direction: column; gap: 18px;
            padding: 20px 0;
        }

        /* ======== 标题 ======== */
        .header { text-align: center; margin-bottom: 8px; }
        .header h1 {
            color: #fff; font-size: 32px; font-weight: 700;
            letter-spacing: 6px; margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.15);
        }
        .header .subtitle {
            color: rgba(255,255,255,0.35); font-size: 11px;
            letter-spacing: 3px; margin-top: 6px; text-transform: uppercase;
        }

        /* ============================================
           核心：Apple Liquid Glass 多层架构
           ============================================ */
        .liquid_glass-wrapper {
            --border-radius: 20px;
            position: relative;
            display: flex;
            overflow: hidden;
            border-radius: var(--border-radius);
            background: var(--glass-bg);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.25);
        }

        /* 第0层：SVG 位移折射 — 边框环带 */
        .liquid_glass-outer {
            backdrop-filter: url(#liquid_glass_filter);
            -webkit-backdrop-filter: url(#liquid_glass_filter);
            position: absolute; inset: 0; z-index: 0;
            border-radius: var(--border-radius);
            mask-image:
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect x="0" y="0" width="100%" height="100%" rx="0" ry="0" fill="white"/></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect x="5" y="5" width="calc(100%25 - 10px)" height="calc(100%25 - 10px)" rx="15" ry="15" fill="white"/></svg>');
            -webkit-mask-image:
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect x="0" y="0" width="100%" height="100%" rx="0" ry="0" fill="white"/></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect x="5" y="5" width="calc(100%25 - 10px)" height="calc(100%25 - 10px)" rx="15" ry="15" fill="white"/></svg>');
            mask-composite: exclude;
            -webkit-mask-composite: xor;
        }

        /* 第1层：磨砂模糊 + 半透明遮罩 */
        .liquid_glass-cover {
            backdrop-filter: blur(18px) saturate(150%);
            -webkit-backdrop-filter: blur(18px) saturate(150%);
            position: absolute; inset: 0; z-index: 2;
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.12);
        }

        /* 第2层：锐利边缘高光 */
        .liquid_glass-sharp {
            position: absolute; inset: 0; z-index: 3;
            box-shadow:
                inset 1px 1px 0px 0px rgba(255,255,255,0.45),
                inset -1px -1px 0px 0px rgba(255,255,255,0.15);
            border-radius: var(--border-radius);
            pointer-events: none;
        }

        /* 第3层：漫反射光晕 */
        .liquid_glass-reflect {
            position: absolute; inset: 1px; z-index: 4;
            box-shadow:
                inset 2px 2px 8px 2px rgba(255,255,255,0.12),
                inset -2px -2px 6px -1px rgba(255,255,255,0.08);
            border-radius: var(--border-radius);
            pointer-events: none;
        }

        /* 第4层：顶部渐变光泽 */
        .liquid_glass-gloss {
            position: absolute; inset: 0; z-index: 4;
            background: linear-gradient(
                170deg,
                rgba(255,255,255,0.12) 0%,
                rgba(255,255,255,0.03) 35%,
                transparent 60%
            );
            border-radius: var(--border-radius);
            pointer-events: none;
        }

        /* 内容层 */
        .liquid_glass-content {
            position: relative; z-index: 5;
            width: 100%;
        }

        /* ======== 输入组件 ======== */
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.45); font-size: 10px; font-weight: 600;
            margin-left: 16px; text-transform: uppercase; letter-spacing: 1.5px;
        }
        .input-group label svg { opacity: 0.5; }

        input {
            width: 100%; padding: 17px 20px; background: transparent; border: none;
            color: #fff; font-size: 16px; outline: none; font-family: inherit;
            letter-spacing: 0.5px;
        }
        input::placeholder { color: rgba(255,255,255,0.2); }
        input:focus { /* 聚焦不做边框变化，保持纯玻璃感 */ }

        /* ======== 数字输入特殊样式 ======== */
        .step-input-wrapper {
            display: flex; align-items: center; padding: 0 20px; gap: 12px;
        }
        .step-input-wrapper input {
            padding: 17px 0; flex: 1; text-align: center;
            font-size: 22px; font-weight: 600; letter-spacing: 2px;
        }
        .step-adjust {
            width: 36px; height: 36px; border: none; border-radius: 50%;
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
            font-size: 18px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .step-adjust:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }

        /* ======== 提交按钮 ======== */
        .btn-action {
            width: 100%; border: none; background: transparent;
            cursor: pointer; padding: 0; margin-top: 6px;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .btn-action:active { transform: scale(0.96); }
        .btn-action .liquid_glass-wrapper {
            background: rgba(255, 103, 0, 0.12);
        }
        .btn-action .liquid_glass-cover {
            background: rgba(255, 103, 0, 0.08);
        }
        .btn-action .liquid_glass-sharp {
            box-shadow:
                inset 1px 1px 0px 0px rgba(255,180,120,0.4),
                inset -1px -1px 0px 0px rgba(255,140,60,0.15);
        }
        .btn-label {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; color: #fff; font-weight: 700; font-size: 15px;
            letter-spacing: 3px; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }
        .btn-label svg { opacity: 0.8; }

        /* 按钮脉冲动画 */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255,103,0,0.3); }
            70% { box-shadow: 0 0 0 12px rgba(255,103,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,103,0,0); }
        }
        .btn-action .liquid_glass-wrapper { animation: pulse-ring 3s infinite; }
        .btn-action:hover .liquid_glass-wrapper { animation: none; }

        /* ======== 状态面板 ======== */
        .status-pane { display: none; }
        .status-pane .liquid_glass-content {
            padding: 16px 20px; text-align: center;
            font-size: 13px; color: rgba(255,255,255,0.8);
            letter-spacing: 0.5px;
        }
        .status-pane .liquid_glass-wrapper {
            border-left: 3px solid rgba(255,103,0,0.4);
        }

        /* ======== 底部导航栏（来自掘金液态玻璃原版） ======== */
        .bottom-bar {
            display: flex; gap: 12px; position: fixed;
            bottom: 0; left: 0; right: 0; z-index: 20;
            padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        .bottom-bar .liquid_glass-wrapper {
            --border-radius: 50px;
        }
        .bottom-bar .icon {
            z-index: 5; display: flex; width: 100%;
            align-items: center; justify-content: center;
        }
        .bottom-bar .bar-center {
            z-index: 5; display: flex; align-items: center;
            width: 100%; padding: 0 20px; gap: 12px;
        }
        .bottom-bar .bar-center .info { margin-right: auto; color: rgba(255,255,255,0.8); }
        .bottom-bar .bar-center .info .title { font-weight: 700; font-size: 13px; }
        .bottom-bar .bar-center .info .sub { font-size: 10px; opacity: 0.7; }

        /* ======== 页脚 ======== */
        .footer {
            text-align: center; color: rgba(255,255,255,0.2);
            font-size: 10px; letter-spacing: 1px; padding: 10px 0 80px;
        }
        .footer span { color: var(--accent); cursor: pointer; text-decoration: underline; opacity: 0.6; }

        /* ======== 加载与过渡动画 ======== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-container > * {
            animation: fadeUp 0.6s cubic-bezier(0.2, 0, 0.2, 1) both;
        }
        .app-container > *:nth-child(1) { animation-delay: 0.1s; }
        .app-container > *:nth-child(2) { animation-delay: 0.2s; }
        .app-container > *:nth-child(3) { animation-delay: 0.3s; }
        .app-container > *:nth-child(4) { animation-delay: 0.4s; }
        .app-container > *:nth-child(5) { animation-delay: 0.5s; }
        .app-container > *:nth-child(6) { animation-delay: 0.6s; }

        /* 发送中旋转 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

<!-- ====== SVG 液态玻璃滤镜 ====== -->
<svg style="display: none">
    <defs>
        <!-- Apple 风格位移滤镜 -->
        <filter id="liquid_glass_filter" x="-10%" y="-10%" width="120%" height="120%" filterUnits="objectBoundingBox">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise" seed="3"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<script>
    function adjustStep(delta) {
        const input = document.getElementById('step');
        let val = parseInt(input.value) || 0;
        val = Math.max(0, Math.min(99999, val + delta));
        input.value = val;
    }

    function invokeSync() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pwd').value.trim();
        const s = document.getElementById('step').value.trim();
        const pane = document.getElementById('statusPane');
        const txt = document.getElementById('statusTxt');
        const btn = document.getElementById('btnTxt');

        if (!u || !p) { alert("请录入完整身份信息"); return; }

        pane.style.display = "block";
        pane.style.animation = "fadeUp 0.4s ease both";
        txt.innerHTML = '<span class="spinner">⏳</span> 正在建立液态同步链路…';
        btn.innerHTML = `
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M18.364 5.63604L16.9497 7.05025C15.683 5.7835 13.933 5 12 5C8.13401 5 5 8.13401 5 12C5 15.866 8.13401 19 12 19C15.866 19 19 15.866 19 12H21C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C14.4853 3 16.7353 4.00736 18.364 5.63604Z"/>
            </svg>
            TRANSMITTING…
        `;

        const api = `http://api.tinise.cn/api/zeep?user=${encodeURIComponent(u)}&pwd=${encodeURIComponent(p)}&step=${encodeURIComponent(s)}&_t=${Date.now()}`;
        fetch(api, { mode: 'no-cors' });

        setTimeout(() => {
            txt.innerHTML = `<span style="color: #00ffcc;">✅ 物理指令下发成功。请刷新 Zeep Life。</span>`;
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
